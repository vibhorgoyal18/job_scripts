name: Refresh Naukri Profile

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC
    - cron: "30 3 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Run Naukri update script
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_BIN: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          python naukri_update.py \
            --email "${{ secrets.NAUKRI_EMAIL }}" \
            --password "${{ secrets.NAUKRI_PASSWORD }}" \
            --headless

      - name: Upload error screenshot (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-error-screenshot
          path: naukri_error.png
