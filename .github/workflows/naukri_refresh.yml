name: Refresh Naukri Profile

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC
    - cron: "30 3 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: "120"
          install-chromedriver: true

      - name: Run Naukri update script
        env:
          DISPLAY: ":99"
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_BIN: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python naukri_update.py \
            --email "${{ secrets.NAUKRI_EMAIL }}" \
            --password "${{ secrets.NAUKRI_PASSWORD }}"

      - name: Upload error screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-screenshot
          path: naukri_error.png
          if-no-files-found: ignore
